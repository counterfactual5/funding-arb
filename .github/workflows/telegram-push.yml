name: TG Funding Push

on:
  # Hourly cadence is driven by an external cron-job.org task that POSTs to
  # GitHub's workflow_dispatch API (see docs/*/serverless-pipeline.md).
  # GitHub's built-in schedule: cron is unreliable for low-activity public
  # repos (observed 3–6h gaps with silently skipped runs).
  #
  # Set inputs.source=cron in the cron-job.org POST body so telegram_push.py
  # receives --skip-if-unchanged (anti-spam). Manual "Run workflow" keeps
  # source=manual (default) and always posts — useful for debugging.
  workflow_dispatch:
    inputs:
      source:
        description: "Trigger source — cron enables skip-if-unchanged anti-spam"
        type: choice
        required: false
        default: manual
        options:
          - manual
          - cron
      min_edge:
        description: "Minimum net edge % (e.g. 0.05)"
        required: false
        default: "0.0"
      top_n:
        description: "How many top spreads to publish"
        required: false
        default: "10"
      include_dex:
        description: "Include perp DEX venues (hyperliquid/aster/lighter/edgex/dydx)"
        type: boolean
        required: false
        default: true

# Grant the in-built GITHUB_TOKEN write access so we can push the snapshot
# to the orphan `gh-pages` branch without needing a separate PAT.
permissions:
  contents: write

concurrency:
  # Only one pipeline run at a time per branch; in-flight runs are cancelled
  # so we never publish a stale snapshot out of order.
  group: tg-funding-push
  cancel-in-progress: true

jobs:
  push:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Minimal runtime deps — scanner uses requests + stdlib only.
      # The optional venue SDKs are NOT needed for scan-only mode.
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install requests

      # ----------------------------------------------------------------
      # Step 0 — Fetch last cycle's snapshot for dedup (best-effort)
      # ----------------------------------------------------------------
      # The previous run committed scanner-latest.json to gh-pages; pull it so
      # the push can tag 🆕/📈/📉 and skip posting when nothing moved. Missing
      # branch / file is fine — the push silently disables dedup.
      - name: Fetch previous snapshot
        run: |
          if git ls-remote --heads origin gh-pages | grep -q gh-pages; then
            git fetch --no-tags --depth=1 origin gh-pages
            git show origin/gh-pages:scanner-latest.json > /tmp/prev-snapshot.json \
              2>/dev/null || true
          fi

      # ----------------------------------------------------------------
      # Step 1 — Telegram broadcast (top-N digest)
      # ----------------------------------------------------------------
      - name: Push digest to Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python scripts/notify/telegram_push.py \
            --min-edge "${{ github.event.inputs.min_edge || '0.0' }}" \
            --top "${{ github.event.inputs.top_n || '10' }}" \
            --prev-snapshot /tmp/prev-snapshot.json \
            ${{ github.event.inputs.source == 'cron' && '--skip-if-unchanged' || '' }} \
            ${{ (github.event_name != 'workflow_dispatch' || github.event.inputs.include_dex == 'true') && '--include-dex' || '' }}

      # ----------------------------------------------------------------
      # Step 2 — Snapshot for the Vercel demo (commit to gh-pages orphan)
      # ----------------------------------------------------------------
      # Always runs — even if Telegram secrets aren't set, the demo site
      # should still refresh. Telegram skips itself gracefully when the
      # secrets are missing (see telegram_push.py).
      - name: Build demo snapshot
        run: |
          python scripts/notify/snapshot_to_pages.py \
            --out /tmp/scanner-latest.json \
            --top 30 \
            --min-edge "${{ github.event.inputs.min_edge || '0.0' }}" \
            ${{ (github.event_name != 'workflow_dispatch' || github.event.inputs.include_dex == 'true') && '--include-dex' || '' }}

      - name: Publish snapshot to gh-pages
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          # Configure the bot identity for the orphan branch commit.
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Save the freshly built snapshot before we touch git state.
          cp /tmp/scanner-latest.json /tmp/scanner-latest.json.bak

          # Fetch gh-pages (orphan branch) and switch to it so the commit
          # actually lands on gh-pages, not main. Using `git checkout <path>`
          # (the old approach) only populated the worktree without moving HEAD,
          # so commits silently went to main and `git push origin gh-pages`
          # reported "Everything up-to-date" (no-op).
          if git ls-remote --heads origin gh-pages | grep -q gh-pages; then
            git fetch --no-tags --depth=1 origin gh-pages
            git checkout -B gh-pages FETCH_HEAD
          else
            git checkout --orphan gh-pages
          fi

          # Wipe the worktree clean — gh-pages should only ever hold the
          # snapshot + README, nothing else.
          git rm -rf --quiet . 2>/dev/null || true

          # Restore the new snapshot.
          cp /tmp/scanner-latest.json.bak ./scanner-latest.json
          cat > README.md <<'EOF'
          # gh-pages — Vercel demo snapshot

          This orphan branch holds a single file, `scanner-latest.json`, refreshed
          hourly by the `TG Funding Push` GitHub Actions workflow. The Vercel
          dashboard fetches it directly from raw.githubusercontent.com (5-min
          edge cache) — see
          [`docs/zh-CN/serverless-pipeline.md`](../main/docs/zh-CN/serverless-pipeline.md)
          for the full architecture.

          Do **not** open PRs against this branch.
          EOF

          # Vercel project Root Directory is `web/`. gh-pages has no app to build —
          # only scanner-latest.json at repo root for raw.githubusercontent.com.
          # Place a stub web/vercel.json so Vercel sees deploymentEnabled:false and
          # skips Preview builds (avoids hourly "deployment failed" emails).
          mkdir -p web
          cat > web/vercel.json <<'VZEOF'
          {
            "$schema": "https://openapi.vercel.sh/vercel.json",
            "git": {
              "deploymentEnabled": false
            }
          }
          VZEOF

          git add scanner-latest.json README.md web/vercel.json
          git commit --allow-empty -m "chore(demo): refresh scanner snapshot [skip ci]"
          git push origin gh-pages

      # ----------------------------------------------------------------
      # Step 3 — Alert on any prior step failure (scan / TG / gh-pages)
      # ----------------------------------------------------------------
      - name: Alert on failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then exit 0; fi
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d text="⚠️ TG Funding Push failed — https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
