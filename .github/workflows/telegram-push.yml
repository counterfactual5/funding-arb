name: TG Funding Push

on:
  schedule:
    # Minutes past every hour — offset away from :00 to dodge GitHub's cron spike.
    - cron: "7 * * *"
  workflow_dispatch:
    inputs:
      min_edge:
        description: "Minimum net edge % (e.g. 0.05)"
        required: false
        default: "0.03"
      top_n:
        description: "How many top spreads to publish"
        required: false
        default: "10"
      include_dex:
        description: "Include perp DEX venues (hyperliquid/aster/lighter/edgex/dydx)"
        type: boolean
        required: false
        default: false

# Grant the in-built GITHUB_TOKEN write access so we can push the snapshot
# to the orphan `gh-pages` branch without needing a separate PAT.
permissions:
  contents: write

concurrency:
  # Only one pipeline run at a time per branch; in-flight runs are cancelled
  # so we never publish a stale snapshot out of order.
  group: tg-funding-push
  cancel-in-progress: true

jobs:
  push:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Minimal runtime deps — scanner uses requests + stdlib only.
      # The optional venue SDKs are NOT needed for scan-only mode.
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install requests

      # ----------------------------------------------------------------
      # Step 1 — Telegram broadcast (top-N digest)
      # ----------------------------------------------------------------
      - name: Push digest to Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python scripts/notify/telegram_push.py \
            --min-edge "${{ github.event.inputs.min_edge || '0.03' }}" \
            --top "${{ github.event.inputs.top_n || '10' }}" \
            ${{ github.event.inputs.include_dex == 'true' && '--include-dex' || '' }}

      # ----------------------------------------------------------------
      # Step 2 — Snapshot for the Vercel demo (commit to gh-pages orphan)
      # ----------------------------------------------------------------
      # Always runs — even if Telegram secrets aren't set, the demo site
      # should still refresh. Telegram skips itself gracefully when the
      # secrets are missing (see telegram_push.py).
      - name: Build demo snapshot
        run: |
          python scripts/notify/snapshot_to_pages.py \
            --out /tmp/scanner-latest.json \
            --top 30 \
            --min-edge "${{ github.event.inputs.min_edge || '0.03' }}" \
            ${{ github.event.inputs.include_dex == 'true' && '--include-dex' || '' }}

      - name: Publish snapshot to gh-pages
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          # Configure the bot identity for the orphan branch commit.
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Fetch any existing gh-pages (orphan — empty tree if absent).
          if git ls-remote --heads origin gh-pages | grep -q gh-pages; then
            git fetch --no-tags --depth=1 origin gh-pages:gh-pages
            git checkout gh-pages -- .
            # Drop the index so we can rewrite the worktree from scratch.
            git rm -rf --cached --quiet . 2>/dev/null || true
          else
            git checkout --orphan gh-pages
            git rm -rf --cached --quiet . 2>/dev/null || true
          fi

          # Place the new snapshot (single source of truth for the demo).
          # A small README documents the branch so anyone landing here via
          # the GitHub UI understands what it is.
          mkdir -p .
          cp /tmp/scanner-latest.json ./scanner-latest.json
          cat > README.md <<'EOF'
          # gh-pages — Vercel demo snapshot

          This orphan branch holds a single file, `scanner-latest.json`, refreshed
          hourly by the `TG Funding Push` GitHub Actions workflow. The Vercel
          dashboard fetches it via the jsDelivr CDN — see
          [`docs/zh-CN/serverless-pipeline.md`](../main/docs/zh-CN/serverless-pipeline.md)
          for the full architecture.

          Do **not** open PRs against this branch.
          EOF

          git add scanner-latest.json README.md
          git commit --allow-empty -m "chore(demo): refresh scanner snapshot [skip ci]"
          git push origin gh-pages
