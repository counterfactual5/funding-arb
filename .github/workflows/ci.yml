name: funding-arb CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # requests is a real runtime dep (venue adapters import it at module load);
      # without it collection fails. Windows is covered so the file-lock path
      # (fcntl on Unix / msvcrt on Windows) stays green on both platforms.
      - run: pip install pytest requests
      - run: python -m pytest scripts/tests/ -q

  docs-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: bash scripts/tools/check_docs_sync.sh
